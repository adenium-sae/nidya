<div class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
        
        <!-- Success State -->
        <div *ngIf="isSent" class="flex flex-col items-center gap-4 text-center">
            <svg class="w-16 h-16 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h3 class="text-xl font-bold text-gray-900">Check your email</h3>
            <p class="text-gray-600">We have sent a password reset link to your email address.</p>
            <button
                routerLink="/auth/sign-in"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors"
            >
                Back to Sign In
            </button>
        </div>

        <!-- Form State -->
        <div *ngIf="!isSent">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Reset Password</h2>
            <p class="text-gray-600 text-sm mb-6">
                Enter your email address and we'll send you a link to reset your password.
            </p>

            <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        formControlName="email"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="you@example.com"
                    />
                    <small *ngIf="formGroup.get('email')?.invalid && formGroup.get('email')?.touched" class="text-red-500 text-xs mt-1 block">
                        Please enter a valid email address.
                    </small>
                </div>

                <button
                    type="submit"
                    [disabled]="formGroup.invalid || isLoading"
                    class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-medium py-2.5 px-4 rounded-lg transition-colors"
                >
                    <span *ngIf="!isLoading">Send Reset Link</span>
                    <span *ngIf="isLoading">Sending...</span>
                </button>

                <div class="text-center text-sm text-gray-600 mt-4">
                    <a routerLink="/auth/sign-in" class="text-blue-600 hover:text-blue-500 font-medium">
                        ← Back to Sign In
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
