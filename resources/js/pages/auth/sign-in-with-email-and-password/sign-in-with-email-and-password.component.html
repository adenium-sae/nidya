<div class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Welcome Back</h2>
        <p class="text-gray-600 text-sm mb-6">Sign in to your account to continue</p>

        <form
            [formGroup]="formGroup"
            (ngSubmit)="onSubmit()"
            class="space-y-4"
        >

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                Email Address
            </label>
            <input
                type="email"
                id="email"
                formControlName="email"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                placeholder="you@example.com"
            />
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                Password
            </label>
            <input
                type="password"
                id="password"
                formControlName="password"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                placeholder="••••••••"
            />
        </div>

        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <input
                    type="checkbox"
                    id="rememberMe"
                    formControlName="rememberMe"
                    class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                />
                <label for="rememberMe" class="text-sm text-gray-700 cursor-pointer">
                    Remember me
                </label>
            </div>

            <a
                routerLink="/auth/forgot-password"
                class="text-sm font-medium text-blue-600 hover:text-blue-500"
            >
                Forgot password?
            </a>
        </div>

        <button
            type="submit"
            [disabled]="formGroup.invalid || isLoading"
            class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-medium py-2.5 px-4 rounded-lg transition-colors"
        >
            <span *ngIf="!isLoading">Sign In</span>
            <span *ngIf="isLoading">Signing in...</span>
        </button>

        <div class="text-center text-sm text-gray-600 mt-4">
            Don't have an account? 
            <a routerLink="/auth/sign-up" class="text-blue-600 hover:text-blue-500 font-medium">Sign up</a>
        </div>

        </form>
    </div>
</div>
