<div class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Set New Password</h2>
        <p class="text-gray-600 text-sm mb-6">Enter your new password below.</p>

        <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="space-y-4">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input
                    type="password"
                    id="password"
                    formControlName="password"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="••••••••"
                />
                <small *ngIf="formGroup.get('password')?.invalid && formGroup.get('password')?.touched" class="text-red-500 text-xs mt-1 block">
                    Password must be at least 8 characters.
                </small>
            </div>

            <div>
                <label for="password_confirmation" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input
                    type="password"
                    id="password_confirmation"
                    formControlName="password_confirmation"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="••••••••"
                />
                <small *ngIf="formGroup.hasError('passwordMismatch') && formGroup.get('password_confirmation')?.touched" class="text-red-500 text-xs mt-1 block">
                    Passwords do not match.
                </small>
            </div>

            <button
                type="submit"
                [disabled]="formGroup.invalid || isLoading"
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-medium py-2.5 px-4 rounded-lg transition-colors"
            >
                <span *ngIf="!isLoading">Reset Password</span>
                <span *ngIf="isLoading">Resetting...</span>
            </button>

            <div class="text-center text-sm text-gray-600 mt-4">
                <a routerLink="/auth/sign-in" class="text-blue-600 hover:text-blue-500 font-medium">
                    ← Back to Sign In
                </a>
            </div>
        </form>
    </div>
</div>
