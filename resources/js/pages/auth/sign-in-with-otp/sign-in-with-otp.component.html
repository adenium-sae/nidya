<div class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">
            {{ step === 'request' ? 'Sign in with OTP' : 'Enter Code' }}
        </h2>
        
        <!-- Step 1: Request OTP -->
        <div *ngIf="step === 'request'">
            <p class="text-gray-600 text-sm mb-6">
                Enter your email and we'll send you a one-time code to sign in.
            </p>

            <form [formGroup]="emailForm" (ngSubmit)="requestOtp()" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        formControlName="email"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="you@example.com"
                    />
                    <small *ngIf="emailForm.get('email')?.invalid && emailForm.get('email')?.touched" class="text-red-500 text-xs mt-1 block">
                        Please enter a valid email address.
                    </small>
                </div>

                <button
                    type="submit"
                    [disabled]="emailForm.invalid || isLoading"
                    class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-medium py-2.5 px-4 rounded-lg transition-colors"
                >
                    <span *ngIf="!isLoading">Send Code</span>
                    <span *ngIf="isLoading">Sending...</span>
                </button>
            </form>
        </div>

        <!-- Step 2: Verify OTP -->
        <div *ngIf="step === 'verify'">
            <p class="text-gray-600 text-sm mb-6">
                We sent a code to <strong class="text-gray-900">{{ email }}</strong>
            </p>

            <form [formGroup]="otpForm" (ngSubmit)="verifyOtp()" class="space-y-4">
                <div>
                    <label for="code" class="block text-sm font-medium text-gray-700 mb-1">Verification Code</label>
                    <input
                        type="text"
                        id="code"
                        formControlName="code"
                        maxlength="6"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-center text-2xl tracking-widest"
                        placeholder="000000"
                    />
                    <small *ngIf="otpForm.get('code')?.invalid && otpForm.get('code')?.touched" class="text-red-500 text-xs mt-1 block">
                        Please enter the 6-digit code.
                    </small>
                </div>

                <button
                    type="submit"
                    [disabled]="otpForm.invalid || isLoading"
                    class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-medium py-2.5 px-4 rounded-lg transition-colors"
                >
                    <span *ngIf="!isLoading">Verify & Sign In</span>
                    <span *ngIf="isLoading">Verifying...</span>
                </button>

                <button
                    type="button"
                    (click)="step = 'request'"
                    class="w-full text-sm text-gray-600 hover:text-gray-900"
                >
                    ← Use a different email
                </button>
            </form>
        </div>

        <div class="text-center text-sm text-gray-600 mt-6">
            <a routerLink="/auth/sign-in" class="text-blue-600 hover:text-blue-500 font-medium">
                ← Back to Sign In
            </a>
        </div>
    </div>
</div>
